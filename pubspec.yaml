name: vidbox
description: A professional video/audio downloader app supporting multiple platforms
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Network & API
  http: ^1.1.0
  dio: ^5.4.0
  html: ^0.15.4

  # Video Info Extraction
  youtube_explode_dart: ^2.2.1

  # Storage & Permissions
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Video Player
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Audio Player
  just_audio: ^0.9.36

  # Notifications
  flutter_local_notifications: ^17.0.0

  # File Handling
  open_filex: ^4.3.4
  file_saver: ^0.2.14

  # Utils
  url_launcher: ^6.2.1
  intl: ^0.18.1
  uuid: ^4.2.2
  flutter_dotenv: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/images/icon.png"
